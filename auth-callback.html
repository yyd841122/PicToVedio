<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Signing In - MotionPic AI</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f4ee;
        color: #17231f;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .panel {
        width: min(100% - 32px, 460px);
        padding: 28px;
        border: 1px solid #ded8cf;
        border-radius: 8px;
        background: #fffaf3;
        box-shadow: 0 24px 80px rgba(35, 28, 20, 0.12);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 26px;
      }
      p {
        color: #66736d;
        line-height: 1.65;
      }
      a {
        color: #0e7f70;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1 id="title">Finishing login...</h1>
      <p id="message">Please wait while MotionPic AI connects this browser account to your email.</p>
    </main>
    <script>
      const getUserId = () => localStorage.getItem("motionpic-user-id") || "";
      const title = document.querySelector("#title");
      const message = document.querySelector("#message");
      const params = new URLSearchParams(window.location.hash.replace(/^#/, "") || window.location.search.replace(/^\?/, ""));
      const accessToken = params.get("access_token") || "";

      const finishLogin = async () => {
        if (!accessToken) {
          title.textContent = "Login link missing token";
          message.textContent = "Open the latest login email, or request a new link from /login.";
          return;
        }

        try {
          const response = await fetch("/api/auth/session", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ accessToken, browserUserId: getUserId() }),
          });
          const result = await response.json();
          if (!response.ok || !result.ok) throw new Error(result.error || "Login could not be completed.");
          localStorage.setItem("motionpic-user-id", result.userId);
          if (result.email) localStorage.setItem("motionpic-auth-email", result.email);
          window.location.replace("/account");
        } catch (error) {
          title.textContent = "Login failed";
          message.textContent = `${error.message} Request a new login link from /login.`;
        }
      };

      finishLogin();
    </script>
  </body>
</html>
