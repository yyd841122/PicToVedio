services:
  - type: web
    name: motionpic-ai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: APP_URL
        value: https://video.cozyguidehub.com
      - key: VIDEO_PROVIDER
        value: mock
      - key: DASHSCOPE_VIDEO_MODEL
        value: wan2.6-i2v-flash
      - key: DATA_PROVIDER
        value: supabase
      - key: PAYMENT_PROVIDER
        value: creem
      - key: CREEM_TEST_MODE
        value: "true"
