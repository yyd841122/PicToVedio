services:
  - type: web
    name: motionpic-ai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: APP_URL
        value: https://video.cozyguidehub.com
      - key: VIDEO_PROVIDER
        value: mock
      - key: DASHSCOPE_VIDEO_MODEL
        value: wan2.6-i2v-flash
      - key: DASHSCOPE_AUDIO
        value: "false"
      - key: DATA_PROVIDER
        value: supabase
      - key: STORAGE_PROVIDER
        value: none
      - key: PAYMENT_PROVIDER
        value: creem
      - key: CREEM_TEST_MODE
        value: "true"
      - key: STARTER_CREDITS
        value: "2"
      - key: CREATOR_PACK_CREDITS
        value: "40"
      - key: COMMERCE_PACK_CREDITS
        value: "160"
      - key: MAX_DAILY_VIDEO_JOBS
        value: "10"
      - key: MAX_DAILY_VIDEO_JOBS_PER_USER
        value: "2"
      - key: ESTIMATED_VIDEO_COST_CNY
        value: "0.6"
