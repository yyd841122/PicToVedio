<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Email Login - MotionPic AI</title>
    <style>
      :root {
        --ink: #17231f;
        --muted: #66736d;
        --line: #ded8cf;
        --paper: #fffaf3;
        --teal: #0e9f8a;
        --coral: #ef725d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #f7f4ee;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .panel {
        width: min(100%, 480px);
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 24px 80px rgba(35, 28, 20, 0.12);
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: inherit;
        font-weight: 800;
        text-decoration: none;
      }
      .mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 8px;
        background: linear-gradient(135deg, #0f9f8a, #ef725d);
        color: white;
      }
      h1 {
        margin: 28px 0 8px;
        font-size: 28px;
      }
      p {
        color: var(--muted);
        line-height: 1.65;
      }
      label {
        display: grid;
        gap: 8px;
        margin-top: 20px;
        font-weight: 800;
      }
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 13px 14px;
        font: inherit;
        background: white;
      }
      button,
      .button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        padding: 0 18px;
        background: var(--teal);
        color: white;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }
      .secondary {
        background: white;
        color: var(--ink);
        border: 1px solid var(--line);
      }
      .status {
        min-height: 24px;
        margin-top: 14px;
        color: var(--muted);
      }
      .error {
        color: #a33a2b;
      }
      .success {
        color: #087766;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <a class="brand" href="/">
        <span class="mark">M</span>
        <span>MotionPic AI</span>
      </a>
      <h1>Email login</h1>
      <p>
        Use email login to keep credits, payments, and generation history beyond one browser. This flow uses Supabase Auth when it is configured.
      </p>
      <form id="loginForm">
        <label>
          Email address
          <input id="email" type="email" autocomplete="email" required placeholder="you@example.com" />
        </label>
        <div class="actions">
          <button id="submitButton" type="submit">Send magic link</button>
          <a class="button secondary" href="/">Back to generator</a>
        </div>
      </form>
      <p class="status" id="status" aria-live="polite"></p>
    </main>
    <script>
      const getUserId = () => {
        const stored = localStorage.getItem("motionpic-user-id");
        if (stored) return stored;
        const randomPart = window.crypto?.randomUUID
          ? window.crypto.randomUUID().replace(/-/g, "")
          : `${Date.now().toString(36)}${Math.random().toString(36).slice(2)}`;
        const id = `mp_${randomPart.slice(0, 32)}`;
        localStorage.setItem("motionpic-user-id", id);
        return id;
      };

      const form = document.querySelector("#loginForm");
      const email = document.querySelector("#email");
      const statusNode = document.querySelector("#status");
      const submitButton = document.querySelector("#submitButton");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        statusNode.className = "status";
        statusNode.textContent = "Sending login link...";
        submitButton.disabled = true;
        try {
          const response = await fetch("/api/auth/magic-link", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-MotionPic-User-ID": getUserId(),
            },
            body: JSON.stringify({ email: email.value.trim(), browserUserId: getUserId() }),
          });
          const result = await response.json();
          if (!response.ok || !result.ok) throw new Error(result.error || "Login email could not be sent.");
          statusNode.className = "status success";
          statusNode.textContent = result.message || "Magic link sent. Check your email.";
        } catch (error) {
          statusNode.className = "status error";
          statusNode.textContent = error.message;
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
